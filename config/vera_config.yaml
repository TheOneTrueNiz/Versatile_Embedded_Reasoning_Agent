# VERA 2.0 Configuration (Legacy)
# ===============================
#
# This YAML config is legacy and is no longer loaded by default.
# Canonical settings now live in config/vera_genome.json (runtime section),
# with environment variables overriding genome defaults.
# Set VERA_USE_YAML_CONFIG=1 to load this file as a fallback for missing fields.
#
# For the legacy schema, see src/core/runtime/config_schema.py

# Core modes
debug: false
observability: false
interactive: true
autonomous: false

# LLM Provider Configuration
llm:
  # Fallback chain: try each provider in order
  # Options: grok, claude, gemini, openai
  fallback_chain:
    - grok      # Primary - xAI Grok
    - claude    # Fallback 1 - Anthropic Claude
    - gemini    # Fallback 2 - Google Gemini
    - openai    # Last resort - OpenAI GPT

  # Max tool-calling rounds per request
  max_tool_rounds: 5

  # Per-request timeout (seconds)
  timeout: 60.0

  # Fallback behavior
  max_retries_per_provider: 2
  cooldown_seconds: 60.0

  # Per-provider overrides (optional)
  # providers:
  #   grok:
  #     provider_id: grok
  #     model: grok-4.20-experimental-beta-0304-reasoning
  #     base_url: https://api.x.ai/v1
  #   claude:
  #     provider_id: claude
  #     model: claude-sonnet-4-20250514
  #   gemini:
  #     provider_id: gemini
  #     model: gemini-2.5-flash
  #   openai:
  #     provider_id: openai
  #     model: gpt-4o

# Messaging Channels
channels:
  discord:
    enabled: false
    # token_env: DISCORD_BOT_TOKEN  # Env var containing bot token
    # command_prefix: "!"
    # allowed_guilds: []
    # allowed_users: []

# Hook System
hooks:
  enabled: true

# Session Management
sessions:
  scope: per_sender  # per_sender | global | per_channel
  transcript_dir: vera_memory/transcripts
  ttl_seconds: 3600
  max_history_messages: 50

# Memory System
memory:
  fast_buffer_size: 100
  fast_threshold: 0.4
  slow_interval: 60.0
  rag_cache_mb: 100
  rag_similarity: 0.7

# Safety & Fault Tolerance
safety:
  fault_tolerance: true
  checkpoint_interval: 300
  max_tool_concurrency: 10
